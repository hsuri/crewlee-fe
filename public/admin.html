<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin — Crewlee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent:        #D97757;
        --accent-hover:  #C4653E;
        --accent-light:  #FEF3EC;
        --navy:          #3A2E2A;
        --slate:         #5C4A42;
        --bg:            #FAF8F4;
        --white:         #FFFFFF;
        --border:        #E8E0D8;
        --success:       #6B8E23;
        --text-primary:  #3A2E2A;
        --text-secondary:#6B5A52;
        --text-muted:    #A08C84;
        --shadow-sm: 0 1px 3px rgba(58,46,42,0.06), 0 1px 2px rgba(58,46,42,0.04);
        --shadow-md: 0 4px 8px rgba(58,46,42,0.07), 0 2px 4px rgba(58,46,42,0.04);
        --shadow-lg: 0 8px 24px rgba(58,46,42,0.09), 0 4px 8px rgba(58,46,42,0.05);
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }

      .hidden { display: none !important; }

      /* Navbar */
      .navbar {
        background: rgba(255,255,255,0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        height: 64px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 17px;
        color: var(--text-primary);
        text-decoration: none;
        letter-spacing: -0.3px;
      }

      .logo a { text-decoration: none; color: inherit; }

      .logout {
        background: var(--white);
        color: var(--text-primary);
        border: 1.5px solid var(--border);
        padding: 8px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
      }

      .logout:hover {
        border-color: var(--slate);
        box-shadow: var(--shadow-md);
      }

      /* Container */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      /* Login Screen */
      .login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .login-box {
        background: var(--white);
        padding: 52px 48px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 400px;
      }

      .login-box h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.6px;
      }

      .login-box p {
        margin: 0 0 32px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .login-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .login-form input {
        padding: 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        transition: all 0.2s ease;
      }

      .login-form input::placeholder { color: var(--text-muted); }

      .login-form input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(217,119,87,0.12);
      }

      .login-form button {
        padding: 13px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
        box-shadow: 0 1px 2px rgba(58,46,42,0.1);
      }

      .login-form button:hover {
        background: var(--accent-hover);
        box-shadow: 0 4px 12px rgba(217,119,87,0.35);
        transform: translateY(-1px);
      }

      .error {
        color: #DC2626;
        font-size: 13px;
        padding: 11px 14px;
        background: #FEF2F2;
        border-radius: 6px;
        border-left: 3px solid #DC2626;
      }

      /* Dashboard */
      .dashboard { animation: fadeIn 0.6s ease-out; }
      .dashboard.hidden { display: none; }

      .dashboard-header { margin-bottom: 40px; }

      .dashboard-header h1 {
        margin: 0 0 6px;
        font-size: 32px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.8px;
      }

      .dashboard-header p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 15px;
      }

      /* Stats */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--white);
        padding: 28px;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        transition: all 0.2s ease;
      }

      .stat-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }

      .stat-label {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 10px;
      }

      .stat-value {
        font-size: 38px;
        font-weight: 800;
        color: var(--accent);
        margin: 0;
        letter-spacing: -1.5px;
        line-height: 1;
      }

      /* Table */
      .table-container {
        background: var(--white);
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead tr {
        background: var(--navy);
      }

      th {
        padding: 14px 16px;
        text-align: left;
        font-weight: 600;
        font-size: 12px;
        color: rgba(255,255,255,0.7);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      td {
        padding: 14px 16px;
        border-top: 1px solid var(--border);
        color: var(--text-primary);
      }

      tbody tr:hover { background: var(--bg); }
      tbody tr:last-child td { border-bottom: none; }

      .role-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 100px;
        background: var(--accent-light);
        color: var(--accent);
      }

      /* Export button */
      .toolbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 16px;
      }

      .export-btn {
        background: var(--white);
        color: var(--text-primary);
        border: 1.5px solid var(--border);
        padding: 8px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
      }

      .export-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: var(--shadow-md);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .navbar { padding: 0 20px; }
        .container { padding: 36px 16px; }
        .login-box { padding: 36px 24px; }
        .stats { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .dashboard-header h1 { font-size: 26px; }
        th { font-size: 11px; padding: 12px; }
        td { font-size: 13px; padding: 11px 12px; }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="22" height="16" rx="4" fill="#D97757"/>
            <path d="M5 17 L3.5 21.5 L10.5 17 Z" fill="#D97757"/>
            <path d="M7 9 L10.5 12.5 L17 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <a href="/">Crewlee</a>
        </div>
        <button class="logout hidden" id="logoutBtn">Logout</button>
      </div>
    </nav>

    <div class="container">
      <!-- Login -->
      <div id="loginScreen" class="login-screen hidden">
        <div class="login-box">
          <h1>Admin Access</h1>
          <p>Sign in to view waitlist signups.</p>
          <form class="login-form" id="loginForm">
            <input type="password" id="password" placeholder="Enter admin password" required />
            <button type="submit">Sign In</button>
            <div class="error hidden" id="loginError"></div>
          </form>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="dashboard" class="dashboard hidden">
        <div class="dashboard-header">
          <h1>Waitlist</h1>
          <p>Everyone who has joined the Crewlee founding waitlist.</p>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total Signups</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Owners</div>
            <div class="stat-value" id="ownerCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">General Managers</div>
            <div class="stat-value" id="gmCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Ops Managers</div>
            <div class="stat-value" id="opsCount">0</div>
          </div>
        </div>

        <div class="toolbar">
          <button class="export-btn" id="exportBtn">Export CSV</button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Restaurant</th>
                <th>Role</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="waitlistTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const token = sessionStorage.getItem('adminToken');
      if (token) {
        showDashboard();
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');

        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });

          if (res.ok) {
            const data = await res.json();
            sessionStorage.setItem('adminToken', data.token);
            showDashboard();
          } else {
            errorDiv.textContent = 'Invalid password';
            errorDiv.classList.remove('hidden');
          }
        } catch {
          errorDiv.textContent = 'Error logging in';
          errorDiv.classList.remove('hidden');
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('adminToken');
        window.location.href = '/';
      });

      let allUsers = [];

      async function showDashboard() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        loadWaitlist();
      }

      async function loadWaitlist() {
        const tok = sessionStorage.getItem('adminToken');
        try {
          const res = await fetch('/api/waitlist', {
            headers: { Authorization: `Bearer ${tok}` },
          });

          if (res.ok) {
            allUsers = await res.json();
            renderTable(allUsers);
            updateStats(allUsers);
          } else {
            sessionStorage.removeItem('adminToken');
            location.reload();
          }
        } catch (err) {
          console.error('Error loading waitlist:', err);
        }
      }

      function renderTable(users) {
        const tbody = document.getElementById('waitlistTable');
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#A08C84;padding:48px 16px;font-size:14px;">No signups yet</td></tr>';
          return;
        }
        tbody.innerHTML = users.map(u => `
          <tr>
            <td style="font-weight:500">${esc(u.name || '—')}</td>
            <td style="color:#6B5A52">${esc(u.email)}</td>
            <td>${esc(u.restaurant || '—')}</td>
            <td><span class="role-badge">${esc(u.role || '—')}</span></td>
            <td style="color:#6B5A52">${new Date(u.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');
      }

      function updateStats(users) {
        document.getElementById('totalCount').textContent = users.length;
        document.getElementById('ownerCount').textContent = users.filter(u => u.role === 'Owner').length;
        document.getElementById('gmCount').textContent = users.filter(u => u.role === 'General Manager').length;
        document.getElementById('opsCount').textContent = users.filter(u => u.role === 'Operations Manager').length;
      }

      document.getElementById('exportBtn').addEventListener('click', () => {
        if (!allUsers.length) return;
        const cols = ['name', 'email', 'restaurant', 'role', 'created_at'];
        const header = cols.join(',');
        const rows = allUsers.map(u =>
          cols.map(c => `"${String(u[c] || '').replace(/"/g, '""')}"`).join(',')
        );
        const blob = new Blob([[header, ...rows].join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'crewlee-waitlist.csv';
        a.click();
        URL.revokeObjectURL(url);
      });

      function esc(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }
    </script>
  </body>
</html>
