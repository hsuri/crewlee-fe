steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'
      - >-
        --set-env-vars=DATABASE_URL=${_DATABASE_URL},ADMIN_PASSWORD=${_ADMIN_PASSWORD},SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_SECURE=${_SMTP_SECURE},SMTP_USER=${_SMTP_USER},SMTP_PASS=${_SMTP_PASS},EMAIL_FROM=${_EMAIL_FROM},NOTIFY_EMAIL=${_NOTIFY_EMAIL},NOTIFY_EMAIL_2=${_NOTIFY_EMAIL_2}

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: my-startup-waitlist  # overridden by deploy.sh from config.js
  _CLOUD_SQL_INSTANCE: ''
  _DATABASE_URL: ''
  _ADMIN_PASSWORD: admin123
  _SMTP_HOST: ''
  _SMTP_PORT: '587'
  _SMTP_SECURE: 'false'
  _SMTP_USER: ''
  _SMTP_PASS: ''
  _EMAIL_FROM: ''
  _NOTIFY_EMAIL: ''
  _NOTIFY_EMAIL_2: ''

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
