<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #1a1a1a;
      --bg: #ffffff;
      --secondary: #f0f0f0;
      --text: #1a1a1a;
      --font: 'Inter', sans-serif;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-card {
      background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 2.5rem; width: 100%; max-width: 380px;
    }
    .login-card h2 { margin-bottom: 1.5rem; font-size: 1.4rem; }
    .login-card input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid #e5e5e5;
      border-radius: 8px; font-size: 1rem; font-family: inherit;
      margin-bottom: 1rem; outline: none; transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: .85rem; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .login-error { color: #e53e3e; font-size: .9rem; margin-top: .5rem; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }

    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .dash-header h1 { font-size: 1.6rem; }
    .dash-header-right { display: flex; align-items: center; gap: 1rem; }
    .btn-logout {
      padding: .5rem 1.2rem; border: 1.5px solid var(--accent); color: var(--accent);
      background: none; border-radius: 8px; cursor: pointer; font-family: inherit;
      font-size: .9rem; font-weight: 600; transition: background .2s, color .2s;
    }
    .btn-logout:hover { background: var(--accent); color: #fff; }

    /* ── Stats ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1.2rem 1.5rem;
    }
    .stat-card .stat-label { font-size: .8rem; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); margin-top: .25rem; }

    /* ── Table ── */
    .table-card {
      background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .table-card h2 { padding: 1.2rem 1.5rem; font-size: 1.1rem; border-bottom: 1px solid #f0f0f0; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th {
      background: #fafafa; text-align: left; padding: .8rem 1rem;
      font-weight: 600; color: #555; border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    td { padding: .75rem 1rem; border-bottom: 1px solid #f7f7f7; color: #333; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 20px;
      font-size: .78rem; font-weight: 600; background: var(--secondary); color: #1a1a1a;
    }
    .empty-state { text-align: center; color: #aaa; padding: 3rem; }
  </style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h2 id="login-title">Admin</h2>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <button class="btn-primary" id="login-btn">Sign In</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────────────────── -->
<div id="dashboard">
  <div class="dash-header">
    <h1 id="dash-title">Waitlist</h1>
    <div class="dash-header-right">
      <span id="dash-count" style="color:#888;font-size:.9rem"></span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="stats-grid" id="stats-grid">
    <!-- Stat cards injected dynamically -->
  </div>

  <div class="table-card">
    <h2>All Signups</h2>
    <div class="table-scroll">
      <table id="entries-table">
        <thead id="table-head"></thead>
        <tbody id="table-body">
          <tr><td colspan="99" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
(async function () {
  // ── Load public config ─────────────────────────────────────────────────────
  let cfg = {
    project: { name: 'Admin' },
    branding: { accentColor: '#FF6B5A', bgColor: '#FFF7ED', secondaryColor: '#B8F2D8', textColor: '#1a1a1a' },
    fields: [],
  };
  try {
    const r = await fetch('/api/config/public');
    if (r.ok) cfg = await r.json();
  } catch (_) {}

  // Apply branding
  const b = cfg.branding || {};
  const root = document.documentElement;
  if (b.accentColor)    root.style.setProperty('--accent',    b.accentColor);
  if (b.bgColor)        root.style.setProperty('--bg',        b.bgColor);
  if (b.secondaryColor) root.style.setProperty('--secondary', b.secondaryColor);
  if (b.textColor)      root.style.setProperty('--text',      b.textColor);
  if (b.fontFamily)     root.style.setProperty('--font',      b.fontFamily);

  document.title = `${cfg.project.name} — Admin`;
  document.getElementById('login-title').textContent = `${cfg.project.name} Admin`;
  document.getElementById('dash-title').textContent = `${cfg.project.name} — Waitlist`;

  // ── Auth ───────────────────────────────────────────────────────────────────
  let token = sessionStorage.getItem('admin_token');

  if (token) showDashboard();

  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('admin_token');
    token = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
  });

  async function login() {
    const pwd = document.getElementById('password-input').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      if (!res.ok) { errEl.textContent = 'Incorrect password'; return; }
      const { token: t } = await res.json();
      token = t;
      sessionStorage.setItem('admin_token', token);
      showDashboard();
    } catch (_) {
      errEl.textContent = 'Could not connect to server';
    }
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────
  async function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    await loadEntries();
  }

  async function loadEntries() {
    let entries = [];
    try {
      const res = await fetch('/api/waitlist', {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) {
        sessionStorage.removeItem('admin_token');
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        return;
      }
      if (res.ok) entries = await res.json();
    } catch (_) {}

    document.getElementById('dash-count').textContent = `${entries.length} signup${entries.length !== 1 ? 's' : ''}`;

    renderStats(entries);
    renderTable(entries);
  }

  function renderStats(entries) {
    const grid = document.getElementById('stats-grid');
    grid.innerHTML = '';

    // Total card
    addStatCard(grid, 'Total Signups', entries.length);

    // One card per select field showing distribution
    cfg.fields
      .filter(f => f.type === 'select' && f.selectOptions)
      .forEach(f => {
        f.selectOptions.forEach(opt => {
          const count = entries.filter(e => e[f.name] === opt).length;
          addStatCard(grid, opt, count);
        });
      });
  }

  function addStatCard(container, label, value) {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-label">${esc(label)}</div><div class="stat-value">${value}</div>`;
    container.appendChild(card);
  }

  function renderTable(entries) {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');

    // Build header from config fields + Joined
    const headerFields = [...cfg.fields, { name: 'created_at', label: 'Joined' }];
    thead.innerHTML = '<tr>' + headerFields.map(f => `<th>${esc(f.label)}</th>`).join('') + '</tr>';

    if (entries.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${headerFields.length}" class="empty-state">No signups yet</td></tr>`;
      return;
    }

    tbody.innerHTML = entries.map(row => {
      const cells = headerFields.map(f => {
        let val = row[f.name] || '';
        if (f.name === 'created_at' && val) {
          val = new Date(val).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        if (f.type === 'select' && val) {
          return `<td><span class="badge">${esc(val)}</span></td>`;
        }
        return `<td>${esc(val)}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
