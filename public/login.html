<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In — Crewlee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/tokens.css" />
    <style>
      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
      }

      .hidden { display: none !important; }

      .login-box {
        background: var(--white);
        padding: 52px 48px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 400px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 17px;
        margin-bottom: 28px;
      }

      .login-box h1 {
        margin: 0 0 8px;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.6px;
      }

      .login-box p {
        margin: 0 0 32px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .login-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .login-form input {
        padding: 13px 16px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        transition: all 0.2s ease;
      }

      .login-form input::placeholder { color: var(--text-muted); }

      .login-form input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(217,119,87,0.12);
      }

      .login-form button {
        padding: 13px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
      }

      .login-form button:hover { background: var(--accent-hover); }
      .login-form button:disabled { opacity: 0.6; cursor: default; }

      .error {
        color: #DC2626;
        font-size: 13px;
        padding: 11px 14px;
        background: #FEF2F2;
        border-radius: 6px;
        border-left: 3px solid #DC2626;
      }

      .hint {
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .hint code {
        background: var(--accent-light);
        color: var(--accent);
        padding: 1px 5px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="1" y="1" width="22" height="16" rx="4" fill="#D97757"/>
          <path d="M5 17 L3.5 21.5 L10.5 17 Z" fill="#D97757"/>
          <path d="M7 9 L10.5 12.5 L17 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Crewlee
      </div>
      <h1>Sign in</h1>
      <p>Access your restaurant's workspace.</p>
      <form class="login-form" id="loginForm">
        <input type="email" id="email" placeholder="Email" required autocomplete="username" />
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" id="submitBtn">Sign In</button>
        <div class="error hidden" id="loginError"></div>
      </form>
      <div class="hint">
        Demo accounts (password <code>password123</code>):<br />
        <code>manager@demo.com</code> · <code>foh@demo.com</code> · <code>boh@demo.com</code>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('loginError');

      if (sessionStorage.getItem('crewleeSession')) {
        window.location.href = '/app';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        errorDiv.classList.add('hidden');

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('email').value,
              password: document.getElementById('password').value,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Invalid email or password');

          sessionStorage.setItem('crewleeSession', JSON.stringify(data));
          window.location.href = '/app';
        } catch (err) {
          errorDiv.textContent = err.message;
          errorDiv.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });
    </script>
  </body>
</html>
