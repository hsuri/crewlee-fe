<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In — Crewlee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/login.css" />
  </head>
  <body>
    <div class="login-box">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="1" y="1" width="22" height="16" rx="4" fill="#D97757"/>
          <path d="M5 17 L3.5 21.5 L10.5 17 Z" fill="#D97757"/>
          <path d="M7 9 L10.5 12.5 L17 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Crewlee
      </div>
      <div class="auth-tabs" id="authTabs">
        <button type="button" class="auth-tab" id="tabLogin">Log in</button>
        <button type="button" class="auth-tab" id="tabSignup">Sign up</button>
      </div>
      <h1 id="loginHeading">Sign in</h1>
      <p id="loginSubtext">Access your restaurant's workspace.</p>
      <form class="login-form" id="loginForm">
        <input type="email" id="email" placeholder="Email" required autocomplete="username" />
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
        <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" class="hidden" />
        <button type="submit" id="submitBtn">Sign In</button>
        <div class="error hidden" id="loginError"></div>
      </form>
      <!-- Shown instead of the form when the same email+password matched more than one
           restaurant account (see login.js's handling of POST /api/auth/login's `accounts`
           response) -- each button is already fully authenticated, so picking one just
           stores that account's session rather than submitting anything else. -->
      <div class="account-picker hidden" id="accountPicker">
        <p>This email is used at more than one restaurant. Which one?</p>
        <div class="account-list" id="accountList"></div>
      </div>
    </div>

    <script type="module" src="/scripts/login.js"></script>
  </body>
</html>
