steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'
      - >-
        --set-env-vars=DATABASE_URL=${_DATABASE_URL},ADMIN_PASSWORD=${_ADMIN_PASSWORD}

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: crewlee
  _CLOUD_SQL_INSTANCE: ''
  _DATABASE_URL: ''
  _ADMIN_PASSWORD: admin123

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
